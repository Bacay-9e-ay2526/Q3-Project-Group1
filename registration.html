<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <header class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">

            <img src="grand union fair matrix (1).png" class="logo" style="height:65px; width:auto;">

            <div class="navbar-nav me-auto">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">Fare Matrix</a>
                <a class="nav-link" href="#">Schedule</a>
                <a class="nav-link" href="#">Help</a>
            </div>

            <button class="btn btn-primary me-2 BookNow">Book Now</button>
            <button class="btn btn-primary">Create Account</button>

        </div>
    </header>


    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6 bg-secondary p-4 rounded">

                <h2 class="text-center mb-4">Registration Form</h2>

                <label>First Name</label>
                <input type="text" id="fname" class="form-control mb-3">

                <label>Last Name</label>
                <input type="text" id="lname" class="form-control mb-3">

                <div class="row">

                    <div class="col">
                        <label>Age</label>
                        <input type="number" id="age" class="form-control mb-3">
                    </div>

                    <div class="col">
                        <label>Contact Number</label>
                        <input type="text" id="contact" class="form-control mb-3">
                    </div>

                </div>

                <label>Email</label>
                <input type="email" id="email" class="form-control mb-3">

                <label>Username</label>
                <input type="text" id="username" class="form-control mb-3">

                <label>Password</label>
                <input type="password" id="password" class="form-control mb-3">

                <button class="btn btn-warning w-100 mt-2" onclick="register()">Register</button>

            </div>

        </div>

    </div>


    <footer class="bg-dark text-white text-center py-3">

        <p>Bacay, Bautista, Co, Gonzales, Maglaqui: 9-Emerald</p>

        <p>
            <a href="https://www.metrolinemap.com/metro/manila/" class="text-white">
                Manila Metro Rail Transit
            </a>
        </p>

    </footer>

</body>

</html>
