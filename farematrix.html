<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fare Matrix</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    

</head>

<body>

    <header class="navbar navbar-expand-sm bg-dark navbar-dark">

        <div class="container-fluid">

            <img src="grand union fair matrix (1).png" style="height:65px; width:auto;">

            <div class="navbar-nav me-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="farematrix.html">Fare Matrix</a>
                <a class="nav-link" href="schedule.html">Schedule</a>
                <a class="nav-link" href="help.html">Help</a>
            </div>

            <a href="register.html">
                <button class="btn btn-primary">
                    Create Account
                </button>
            </a>

        </div>

    </header>

    <br><br>

    <main class="container">

        <div class="container bg-dark text-light p-4 rounded">

            <h1 class="text-center text-warning">
                Grand Union Fare Matrix
            </h1>

            <br>

            <h3>Pick Up Location</h3>

            <select id="pickup" class="form-control">

                <option value="1">Santolan</option>
                <option value="2">Katipunan</option>
                <option value="3">Anonas</option>
                <option value="4">Araneta Center-Cubao</option>
                <option value="5">Betty Go-Belmonte</option>
                <option value="6">Gilmore</option>
                <option value="7">J. Ruiz</option>
                <option value="8">V. Mapa</option>
                <option value="9">Pureza</option>
                <option value="10">Legarda</option>
                <option value="11">Recto</option>

            </select>

            <br>

            <h3>Drop Off Location</h3>

            <select id="dropoff" class="form-control">

                <option value="1">Santolan</option>
                <option value="2">Katipunan</option>
                <option value="3">Anonas</option>
                <option value="4">Araneta Center-Cubao</option>
                <option value="5">Betty Go-Belmonte</option>
                <option value="6">Gilmore</option>
                <option value="7">J. Ruiz</option>
                <option value="8">V. Mapa</option>
                <option value="9">Pureza</option>
                <option value="10">Legarda</option>
                <option value="11">Recto</option>

            </select>

            <div class="d-flex justify-content-center mt-4 gap-3">

                <button class="btn btn-primary" onclick="regularFare()">
                    Regular Fare
                </button>

                <button class="btn btn-primary" onclick="discountFare()">
                    Discounted Fare
                </button>

            </div>

            <br>

            <h2 id="fareDisplay">
                Fare:
            </h2>

        </div>

    </main>

    <footer class="bg-dark text-white text-center fixed-bottom py-1">

        <p>
            Group 1: 9-Emerald @obmontessori.edu.ph
        </p>

        <p>
            <a href="https://www.metrolinemap.com/metro/manila/" class="text-white">
                Manila Metro Rail Transit
            </a>
        </p>

    </footer>

    <script src="main.js"></script>

</body>
</html>
